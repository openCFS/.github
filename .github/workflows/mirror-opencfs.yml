name: Mirror openCFS from GitLab

on:
  schedule:
    - cron: '0 3 * * *'   # runs daily at 3am UTC
  workflow_dispatch:        # allows manual trigger from the GitHub UI

jobs:
  mirror:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.OPENCFS_MIRROR_TOKEN }}
      GITLAB_PROJECT_ID: "openCFS%2Fcfs"   # URL-encoded namespace/project
      TARGET_REPO: "openCFS/cfs"           # org/repo on GitHub

    steps:
      # -------------------------------------------------------------------
      # 1. Mirror all branches and tags from GitLab to GitHub
      # -------------------------------------------------------------------
      - name: Clone from GitLab
        run: git clone --bare https://gitlab.com/openCFS/cfs.git .

      - name: Push mirror to GitHub
        run: git push --mirror "https://x:${{ secrets.OPENCFS_MIRROR_TOKEN }}@github.com/${{ env.TARGET_REPO }}.git"

      # -------------------------------------------------------------------
      # 2. Fix default branch (push --mirror overwrites HEAD each time)
      # -------------------------------------------------------------------
      - name: Set default branch to master
        run: |
          curl -s -X PATCH \
            -H "Authorization: token ${{ secrets.OPENCFS_MIRROR_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ env.TARGET_REPO }} \
            -d '{"default_branch":"master"}'

      # -------------------------------------------------------------------
      # 3. Fetch latest release metadata from GitLab.
      #    Uses the releases list API (?per_page=1) sorted by released_at
      #    descending (default), so .[0] is always the most recent release
      #    regardless of whether it is explicitly marked "latest" on GitLab.
      # -------------------------------------------------------------------
      - name: Get latest GitLab release
        id: gitlab_release
        run: |
          RELEASE=$(curl -s \
            "https://gitlab.com/api/v4/projects/${{ env.GITLAB_PROJECT_ID }}/releases?per_page=1" \
            | jq -r '.[0]')

          TAG=$(echo "$RELEASE" | jq -r '.tag_name')
          NAME=$(echo "$RELEASE" | jq -r '.name')
          DESC=$(echo "$RELEASE" | jq -r '.description')

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT

          # Write description to a file to preserve newlines safely
          echo "$DESC" > release_notes.md

          echo "Found latest GitLab release: $TAG ($NAME)"

      # -------------------------------------------------------------------
      # 4. Download binary assets from the latest GitLab release.
      #    Asset URLs and filenames are read dynamically from the API
      #    via .assets.links[], so no hardcoded filenames are needed.
      #    Source archives (zip, tar.gz, etc.) are excluded — GitLab lists
      #    those under .assets.sources, not .assets.links, and GitHub
      #    generates them automatically from the tag anyway.
      # -------------------------------------------------------------------
      - name: Download release assets from GitLab
        run: |
          mkdir -p assets

          RELEASE=$(curl -s \
            "https://gitlab.com/api/v4/projects/${{ env.GITLAB_PROJECT_ID }}/releases?per_page=1" \
            | jq -r '.[0]')

          LINK_COUNT=$(echo "$RELEASE" | jq '.assets.links | length')

          if [ "$LINK_COUNT" -eq 0 ]; then
            echo "No binary assets found on the GitLab release, skipping download."
          else
            echo "$RELEASE" | jq -c '.assets.links[]' | while read -r link; do
              NAME=$(echo "$link" | jq -r '.name')
              URL=$(echo "$link"  | jq -r '.direct_asset_url // .url')
              # Derive filename from the URL path, stripping query strings
              FILENAME=$(basename "$(echo "$URL" | cut -d'?' -f1)")
              echo "Downloading: $NAME -> $FILENAME"
              HTTP_CODE=$(curl -L -o "assets/${FILENAME}" -w "%{http_code}" "$URL")
              if [ "$HTTP_CODE" != "200" ]; then
                echo "  -> HTTP $HTTP_CODE, skipping $FILENAME"
                rm -f "assets/${FILENAME}"
              else
                echo "  -> saved ($(du -h "assets/${FILENAME}" | cut -f1))"
              fi
            done
          fi

          echo "Assets downloaded:"
          ls -lh assets/ || echo "(none)"

      # -------------------------------------------------------------------
      # 5. Delete existing 'latest' GitHub release (if any) and recreate it
      #    gh CLI is pre-installed on ubuntu-latest runners
      # -------------------------------------------------------------------
      - name: Delete existing 'latest' release on GitHub if present
        run: |
          gh release delete latest \
            --repo ${{ env.TARGET_REPO }} \
            --yes \
            --cleanup-tag \
          || echo "No existing 'latest' release to delete, continuing."

      - name: Create new 'latest' release on GitHub with assets
        run: |
          ASSET_FILES=$(find assets/ -type f | tr '\n' ' ')

          if [ -z "$ASSET_FILES" ]; then
            # No binary assets — create release without files
            gh release create latest \
              --repo ${{ env.TARGET_REPO }} \
              --title "${{ steps.gitlab_release.outputs.name }}" \
              --notes-file release_notes.md \
              --latest
          else
            gh release create latest \
              --repo ${{ env.TARGET_REPO }} \
              --title "${{ steps.gitlab_release.outputs.name }}" \
              --notes-file release_notes.md \
              --latest \
              $ASSET_FILES
          fi

          echo "Release 'latest' created successfully."
          echo "Mirrored from GitLab tag: ${{ steps.gitlab_release.outputs.tag }}"
