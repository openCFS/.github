name: Mirror openCFS from GitLab

on:
  schedule:
    - cron: '0 3 * * *'   # runs daily at 3am UTC
  workflow_dispatch:        # allows manual trigger from the GitHub UI

jobs:
  mirror:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.OPENCFS_MIRROR_TOKEN }}
      GITLAB_PROJECT_ID: "openCFS%2Fcfs"   # URL-encoded namespace/project
      TARGET_REPO: "openCFS/cfs"           # org/repo on GitHub

    steps:
      # -------------------------------------------------------------------
      # 1. Mirror all branches and tags from GitLab to GitHub
      # -------------------------------------------------------------------
      - name: Clone from GitLab
        run: git clone --bare https://gitlab.com/openCFS/cfs.git .

      - name: Push mirror to GitHub
        run: git push --mirror "https://x:${{ secrets.OPENCFS_MIRROR_TOKEN }}@github.com/${{ env.TARGET_REPO }}.git"

      # -------------------------------------------------------------------
      # 1a. Rewrite GitLab URLs to GitHub URLs in the main repo.
      #     Applies the same sed rules as the wiki rewrite below.
      #     Covers README.md and all other .md files in the repo.
      #     The rewritten commit is force-pushed to GitHub only — the
      #     GitLab repo is never touched.
      # -------------------------------------------------------------------
      - name: Rewrite GitLab URLs to GitHub URLs in main repo
        run: |
          git clone . repo-rewrite
          cd repo-rewrite

          find . -name "*.md" | xargs sed -i 's|https://gitlab.com/openCFS/cfs/-/blob/|https://github.com/openCFS/cfs/blob/|g'
          find . -name "*.md" | xargs sed -i 's|https://gitlab.com/openCFS/cfs/-/tree/|https://github.com/openCFS/cfs/tree/|g'
          find . -name "*.md" | xargs sed -i 's|https://gitlab.com/openCFS/cfs/-/wikis/|https://github.com/openCFS/cfs/wiki/|g'
          find . -name "*.md" | xargs sed -i 's|https://gitlab.com/openCFS/cfs\.git|https://github.com/openCFS/cfs.git|g'
          find . -name "*.md" | xargs sed -i 's|https://gitlab.com/openCFS/cfs\([^a-zA-Z/]\)|https://github.com/openCFS/cfs\1|g'
          find . -name "*.md" | xargs sed -i 's|https://gitlab.com/openCFS/cfs$|https://github.com/openCFS/cfs|g'
          find . -name "*.md" | xargs sed -i 's|https://gitlab.com/openCFS/CFS\.git|https://github.com/openCFS/cfs.git|g'
          find . -name "*.md" | xargs sed -i 's|https://gitlab.com/openCFS/CFS\([^a-zA-Z/]\)|https://github.com/openCFS/cfs\1|g'
          find . -name "*.md" | xargs sed -i 's|https://gitlab.com/openCFS/CFS$|https://github.com/openCFS/cfs|g'
          find . -name "*.md" | xargs sed -i 's|?ref_type=heads||g'

          if git diff --quiet; then
            echo "No URLs needed rewriting in main repo."
          else
            echo "Rewrote the following files:"
            git diff --name-only
            git config user.email "mirror-bot@github-actions"
            git config user.name "Mirror Bot"
            git add -A
            git commit -m "chore: rewrite GitLab URLs to GitHub equivalents for mirrored copy"
            git push "https://x:${{ secrets.OPENCFS_MIRROR_TOKEN }}@github.com/${{ env.TARGET_REPO }}.git" HEAD:master --force
          fi

      # -------------------------------------------------------------------
      # 1b. Mirror the wiki from GitLab to GitHub.
      #     The wiki is a separate bare git repo at <project>.wiki.git.
      #     Requires the GitHub wiki to be enabled and initialised with at
      #     least one page before the first push (Settings -> Features ->
      #     Wikis, then create a dummy page via the Wiki tab).
      # -------------------------------------------------------------------
      - name: Clone wiki from GitLab
        run: git clone --bare https://gitlab.com/openCFS/cfs.wiki.git wiki.git

      - name: Rewrite GitLab URLs to GitHub URLs in wiki
        run: |
          git clone wiki.git wiki-rewrite
          cd wiki-rewrite

          find . -name "*.md" | xargs sed -i 's|https://gitlab.com/openCFS/cfs/-/blob/|https://github.com/openCFS/cfs/blob/|g'
          find . -name "*.md" | xargs sed -i 's|https://gitlab.com/openCFS/cfs/-/tree/|https://github.com/openCFS/cfs/tree/|g'
          find . -name "*.md" | xargs sed -i 's|https://gitlab.com/openCFS/cfs/-/wikis/|https://github.com/openCFS/cfs/wiki/|g'
          find . -name "*.md" | xargs sed -i 's|https://gitlab.com/openCFS/cfs\.git|https://github.com/openCFS/cfs.git|g'
          find . -name "*.md" | xargs sed -i 's|https://gitlab.com/openCFS/cfs\([^a-zA-Z/]\)|https://github.com/openCFS/cfs\1|g'
          find . -name "*.md" | xargs sed -i 's|https://gitlab.com/openCFS/cfs$|https://github.com/openCFS/cfs|g'
          find . -name "*.md" | xargs sed -i 's|https://gitlab.com/openCFS/CFS\.git|https://github.com/openCFS/cfs.git|g'
          find . -name "*.md" | xargs sed -i 's|https://gitlab.com/openCFS/CFS\([^a-zA-Z/]\)|https://github.com/openCFS/cfs\1|g'
          find . -name "*.md" | xargs sed -i 's|https://gitlab.com/openCFS/CFS$|https://github.com/openCFS/cfs|g'
          find . -name "*.md" | xargs sed -i 's|?ref_type=heads||g'

          if git diff --quiet; then
            echo "No URLs needed rewriting in wiki."
          else
            echo "Rewrote the following files:"
            git diff --name-only
            git config user.email "mirror-bot@github-actions"
            git config user.name "Mirror Bot"
            git add -A
            git commit -m "chore: rewrite GitLab URLs to GitHub equivalents for mirrored copy"
            git push
          fi
          # Note: the following are intentionally left unchanged:
          #   gitlab.com/openCFS/Testsuite        - private, cannot mirror
          #   gitlab.com/openCFS/build-environment - private, cannot mirror
          #   gitlab.com/openCFS/cfs/-/pipelines  - GitLab CI, no GitHub equivalent
          #   gitlab.com/openCFS/cfs/-/issues     - issue tracker, stays on GitLab
          #   gitlab.com/openCFS/cfs/-/jobs       - CI jobs, stays on GitLab
          #   gitlab.com/openCFS/cfs/-/packages   - package registry, stays on GitLab
          #   gitlab.com/openCFS/cfs/-/forks      - GitLab-specific
          #   gitlab.com/groups/openCFS/-/wikis   - group-level wiki, separate
          #   gitlab.com/mmzakhar/oneapi-ci       - third-party repo
          #   gitlab.com/help/...                 - GitLab docs
          #   gitlab.com/gitlab-org/...           - GitLab platform

      - name: Push wiki mirror to GitHub
        working-directory: wiki.git
        run: git push --mirror "https://x:${{ secrets.OPENCFS_MIRROR_TOKEN }}@github.com/${{ env.TARGET_REPO }}.wiki.git"

      # -------------------------------------------------------------------
      # 2. Fix default branch (push --mirror overwrites HEAD each time)
      # -------------------------------------------------------------------
      - name: Set default branch to master
        run: |
          curl -s -X PATCH \
            -H "Authorization: token ${{ secrets.OPENCFS_MIRROR_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ env.TARGET_REPO }} \
            -d '{"default_branch":"master"}'

      # -------------------------------------------------------------------
      # 3. Mirror all GitLab releases to GitHub.
      #    - Fetches all releases from GitLab (paginated).
      #    - Skips releases that already exist on GitHub (idempotent),
      #      including drafts (checked via API, not just gh release view).
      #    - Downloads all binary assets dynamically from .assets.links[].
      #    - Source archives are excluded (GitHub generates them from tags).
      #    - Processes oldest-first so the most recent release is created
      #      last and keeps the "latest" UI label correctly.
      #    - After the loop, explicitly sets "latest" label on the most
      #      recent release to correct any pre-existing misplacement.
      # -------------------------------------------------------------------
      - name: Mirror all releases from GitLab to GitHub
        run: |
          PAGE=1
          ALL_RELEASES="[]"

          while true; do
            BATCH=$(curl -s \
              "https://gitlab.com/api/v4/projects/${{ env.GITLAB_PROJECT_ID }}/releases?per_page=100&page=${PAGE}")
            COUNT=$(echo "$BATCH" | jq 'length')
            if [ "$COUNT" -eq 0 ]; then
              break
            fi
            ALL_RELEASES=$(echo "$ALL_RELEASES $BATCH" | jq -s '.[0] + .[1]')
            PAGE=$((PAGE + 1))
          done

          TOTAL=$(echo "$ALL_RELEASES" | jq 'length')
          echo "Found $TOTAL releases on GitLab."

          LATEST_TAG=$(echo "$ALL_RELEASES" | jq -r '.[0].tag_name')
          echo "Latest release tag: $LATEST_TAG"

          EXISTING=$(curl -s \
            -H "Authorization: token ${{ secrets.OPENCFS_MIRROR_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ env.TARGET_REPO }}/releases?per_page=100" \
            | jq -r '.[].tag_name')

          echo "Existing GitHub releases: $(echo "$EXISTING" | tr '\n' ' ')"

          echo "$ALL_RELEASES" | jq -c 'reverse | .[]' | while read -r release; do
            TAG=$(echo "$release"  | jq -r '.tag_name')
            NAME=$(echo "$release" | jq -r '.name')
            DESC=$(echo "$release" | jq -r '.description')

            echo ""
            echo "==> Processing release: $TAG ($NAME)"

            if echo "$EXISTING" | grep -qx "$TAG"; then
              echo "    Already exists on GitHub, skipping."
              continue
            fi

            mkdir -p "assets_${TAG}"
            LINK_COUNT=$(echo "$release" | jq '.assets.links | length')

            if [ "$LINK_COUNT" -gt 0 ]; then
              echo "$release" | jq -c '.assets.links[]' | while read -r link; do
                ASSET_NAME=$(echo "$link" | jq -r '.name')
                URL=$(echo "$link"        | jq -r '.direct_asset_url // .url')
                FILENAME=$(basename "$(echo "$URL" | cut -d'?' -f1)")
                echo "    Downloading: $ASSET_NAME -> $FILENAME"
                HTTP_CODE=$(curl -L -o "assets_${TAG}/${FILENAME}" -w "%{http_code}" "$URL")
                if [ "$HTTP_CODE" != "200" ]; then
                  echo "    -> HTTP $HTTP_CODE, skipping $FILENAME"
                  rm -f "assets_${TAG}/${FILENAME}"
                else
                  echo "    -> saved ($(du -h "assets_${TAG}/${FILENAME}" | cut -f1))"
                fi
              done
            else
              echo "    No binary assets found for this release."
            fi

            echo "$DESC" > "notes_${TAG}.md"
            ASSET_FILES=$(find "assets_${TAG}/" -type f | tr '\n' ' ')

            LATEST_FLAG=""
            if [ "$TAG" = "$LATEST_TAG" ]; then
              LATEST_FLAG="--latest"
            fi

            if [ -z "$ASSET_FILES" ]; then
              gh release create "$TAG" \
                --repo ${{ env.TARGET_REPO }} \
                --title "$NAME" \
                --notes-file "notes_${TAG}.md" \
                --verify-tag \
                $LATEST_FLAG
            else
              gh release create "$TAG" \
                --repo ${{ env.TARGET_REPO }} \
                --title "$NAME" \
                --notes-file "notes_${TAG}.md" \
                --verify-tag \
                $LATEST_FLAG \
                $ASSET_FILES
            fi

            echo "    Release $TAG created on GitHub."
            rm -rf "assets_${TAG}" "notes_${TAG}.md"
          done

          echo "==> Ensuring 'latest' label is on $LATEST_TAG..."
          gh release edit "$LATEST_TAG" \
            --repo ${{ env.TARGET_REPO }} \
            --latest

          echo ""
          echo "==> All releases mirrored. Latest: $LATEST_TAG"
